services:
  - type: web
    name: miroir
    env: node
    buildCommand: npm install
    startCommand: node server.mjs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: miroir-db
          property: connectionString
      - key: LLM_ENDPOINT
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: NODE_VERSION
        value: 20

databases:
  - name: miroir-db
    plan: free
    postgresMajorVersion: 16
