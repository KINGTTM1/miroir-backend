<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>miroir — carnet d'engagements</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f11;--surface:#18181c;--surface2:#1f1f24;--border:#2a2826;--ink:#e8e4da;--ink-dim:#6b685e;--ink-muted:#49473f;--accent:#c49a6c;--accent-dim:#5a4530;--danger:#8a4a3e;--success:#5a7a4e;--radius:6px;--font-serif:Georgia,'Times New Roman',serif;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
html{font-size:16px}
body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6;padding:2rem 1rem}
@media(min-width:640px){body{padding:3rem 2rem}}
h1{font-family:var(--font-serif);font-size:1.6rem;font-weight:400;letter-spacing:.02em}
h1 span{color:var(--accent)}
.container{max-width:480px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;padding-bottom:1.5rem;border-bottom:1px solid var(--border);margin-bottom:2rem}
.sub{font-size:.75rem;color:var(--ink-muted);font-style:italic}
.btn{background:transparent;border:1px solid var(--border);color:var(--ink-dim);border-radius:var(--radius);padding:.5rem 1rem;font-size:.8rem;cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--accent-dim);color:var(--accent)}
.btn-primary{background:var(--accent-dim);border:1px solid var(--accent);color:var(--ink);border-radius:var(--radius);padding:.6rem 1.5rem;font-size:.85rem;cursor:pointer;transition:all .2s;font-family:var(--font-serif)}
.btn-primary:hover{background:var(--accent);color:var(--bg)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:none;border:none;color:var(--ink-muted);cursor:pointer;font-size:.8rem;padding:.3rem}
.btn-ghost:hover{color:var(--ink-dim)}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem;font-size:.85rem;color:var(--ink);outline:none;font-family:var(--font-sans);transition:border-color .2s;width:100%}
input:focus,select:focus{border-color:var(--accent-dim)}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem;font-size:.85rem;color:var(--ink);resize:none;outline:none;font-family:var(--font-sans);min-height:60px}
textarea:focus{border-color:var(--accent-dim)}
.actions{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem;animation:fadeSlide .4s ease}
.identity-text{font-family:var(--font-serif);font-size:1.3rem;color:var(--ink);line-height:1.5;margin:.5rem 0 1rem}
.original-text{font-size:.75rem;color:var(--ink-muted);text-decoration:line-through;margin-bottom:.5rem}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:.5rem 0}
.progress-bar .fill{height:100%;background:var(--accent);border-radius:2px;transition:width .6s ease}
.stat-row{display:flex;gap:1rem;margin:.75rem 0}
.stat{flex:1;text-align:center;padding:.5rem;background:var(--surface2);border-radius:var(--radius)}
.stat .num{font-size:1.5rem;font-weight:300;font-family:var(--font-serif)}
.stat .num.up{color:var(--success)}
.stat .num.down{color:var(--danger)}
.stat .label{font-size:.65rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:.15rem}
.day-check{display:flex;gap:3px;margin:.5rem 0;flex-wrap:wrap}
.day-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all .2s}
.day-dot.done{background:var(--accent)}
.day-dot.today{background:var(--accent-dim);box-shadow:0 0 0 2px var(--accent)}
.day-dot.future{opacity:.3}

/* Splash */
.splash-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease}
.splash-overlay.hidden{opacity:0;pointer-events:none}
.splash-title{font-family:var(--font-serif);font-size:2.2rem;color:var(--ink);letter-spacing:.04em;margin-bottom:1rem;opacity:0;animation:fadeSlide .8s ease .3s forwards}
.splash-title span{color:var(--accent)}
.splash-sub{font-size:.8rem;color:var(--ink-muted);font-style:italic;margin-bottom:2rem;opacity:0;animation:fadeSlide .8s ease .6s forwards}
.splash-safe{position:relative;width:180px;height:150px;margin-bottom:2rem;opacity:0;animation:fadeSlide .8s ease .9s forwards}
.safe-body{width:180px;height:140px;background:linear-gradient(145deg,#2a2826,#1a1816);border:3px solid #3a3836;border-radius:8px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.safe-door{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(145deg,#2a2826,#1a1816);border-radius:6px;transform-origin:left center;transition:transform 1.2s cubic-bezier(.4,0,.2,1);z-index:2}
.safe-door.open{transform:perspective(800px) rotateY(-110deg)}
.safe-dial{position:absolute;top:50%;left:50%;width:56px;height:56px;margin:-28px 0 0 -28px;border:3px solid #4a4846;border-radius:50%;background:radial-gradient(circle,#3a3836,#1a1816);z-index:3;display:flex;align-items:center;justify-content:center}
.safe-dial.spinning{animation:spinDial 5s cubic-bezier(.4,0,.2,1)}
.safe-dial-inner{width:16px;height:16px;border-radius:50%;background:var(--accent);opacity:.8}
.dial-mark{position:absolute;width:2px;height:8px;background:#5a5856;top:4px;left:50%;margin-left:-1px;transform-origin:50% 24px}
.safe-handle{position:absolute;right:12px;top:50%;margin-top:-8px;width:24px;height:16px;border:3px solid #4a4846;border-radius:4px;background:#3a3836;z-index:3;transition:transform 1s ease .5s}
.safe-handle.turned{transform:rotate(90deg)}
.safe-glow{position:absolute;inset:-10px;border-radius:12px;background:radial-gradient(ellipse at center, rgba(196,154,108,.15), transparent 70%);opacity:0;transition:opacity 1s ease;z-index:0}
.safe-glow.active{opacity:1}
.splash-btn{background:transparent;border:1px solid var(--accent-dim);color:var(--accent);border-radius:var(--radius);padding:.75rem 2.5rem;font-size:1rem;cursor:pointer;transition:all .3s;opacity:0;animation:fadeSlide .8s ease 1.2s forwards;font-family:var(--font-serif);letter-spacing:.06em}
.splash-btn:hover{background:var(--accent-dim);color:var(--ink);border-color:var(--accent)}
.splash-btn:disabled{opacity:.3;cursor:not-allowed}

@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-200px) rotate(720deg);opacity:0}}
@keyframes spinDial{0%{transform:rotate(0deg)}100%{transform:rotate(720deg)}}
@keyframes celebrate{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Experiences */
.exp-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;margin-bottom:.4rem;opacity:.7;cursor:pointer;transition:all .2s;animation:fadeSlide .4s ease}
.exp-card:hover{opacity:1;border-color:var(--accent-dim)}
.exp-card .id{font-family:var(--font-serif);font-size:.85rem;color:var(--ink-dim)}
.exp-card .meta{font-size:.65rem;color:var(--ink-muted);margin-top:.15rem}
.celebration-overlay{position:fixed;inset:0;z-index:300;pointer-events:none;overflow:hidden}
.celebration-piece{position:absolute;bottom:-10px;width:8px;height:8px;border-radius:2px;animation:confetti 2s ease-out forwards}
.celebration-piece:nth-child(odd){background:var(--accent)}
.celebration-piece:nth-child(even){background:var(--accent-dim)}
</style>
</head>
<body>
<div class="splash-overlay" id="splash">
  <div class="splash-title">miroir<span>.</span></div>
  <div class="splash-sub">carnet d'engagements</div>
  <div class="splash-safe" id="splashSafe">
    <div class="safe-body">
      <div class="safe-glow" id="safeGlow"></div>
      <div class="safe-door" id="safeDoor">
        <div class="safe-dial" id="safeDial">
          <div class="dial-mark" style="transform:rotate(0deg)"></div>
          <div class="dial-mark" style="transform:rotate(30deg)"></div>
          <div class="dial-mark" style="transform:rotate(60deg)"></div>
          <div class="dial-mark" style="transform:rotate(90deg)"></div>
          <div class="dial-mark" style="transform:rotate(120deg)"></div>
          <div class="dial-mark" style="transform:rotate(150deg)"></div>
          <div class="dial-mark" style="transform:rotate(180deg)"></div>
          <div class="dial-mark" style="transform:rotate(210deg)"></div>
          <div class="dial-mark" style="transform:rotate(240deg)"></div>
          <div class="dial-mark" style="transform:rotate(270deg)"></div>
          <div class="dial-mark" style="transform:rotate(300deg)"></div>
          <div class="dial-mark" style="transform:rotate(330deg)"></div>
          <div class="safe-dial-inner"></div>
        </div>
      </div>
      <div class="safe-handle" id="safeHandle"></div>
    </div>
  </div>
  <button class="splash-btn" id="splashBtn" onclick="(function(){var b=document.getElementById('splashBtn');b.disabled=true;b.textContent='...';document.getElementById('safeDial').classList.add('spinning');setTimeout(function(){document.getElementById('safeDial').classList.remove('spinning');document.getElementById('safeDoor').classList.add('open');document.getElementById('safeHandle').classList.add('turned');document.getElementById('safeGlow').classList.add('active');b.textContent='\u2728';setTimeout(function(){document.getElementById('splash').classList.add('hidden');if(!window._loaded){window._loaded=true;load()}setTimeout(function(){var s=document.getElementById('splash');if(s)s.remove()},800)},1000)},5000)})()">ouvrir</button>
</div>
<div class="container" id="app"></div>
<script>
const A='';const API=A+'/api';
function req(p,o={}){return fetch(API+p,{headers:{'Content-Type':'application/json',...o.headers},...o}).then(r=>r.json())}
function e(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
async function load(){
  const g=await req('/goal/current');
  const app=document.getElementById('app');
  if(!g.active){
    // Show experience + new goal form
    const exps=await req('/goals/experiences');
    let ex='';
    if(exps.length){ex=`<div style="margin-top:1.5rem;font-size:.65rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.08em">✦ Expériences</div>
      ${exps.map(x=>`<div class="exp-card" onclick="showScore('${x.id}')"><div class="id">${e(x.identity||x.text)}</div><div class="meta">${x.avgScore}/100 · ${x.responseCount} réponses</div></div>`).join('')}`;}
    app.innerHTML=`<header><div><h1>miroir<span>.</span></h1><div class="sub">carnet d'engagements</div></div></header>
      <div class="card">
        <div style="font-size:.8rem;color:var(--ink-dim);margin-bottom:.25rem">Je choisis de...</div>
        <input id="goalInput" placeholder="ex: méditer 10 minutes chaque matin" autocomplete="off" style="margin-bottom:.5rem"/>
        <select id="durationSelect" style="font-size:.8rem;margin-bottom:.75rem">
          <option value="7">7 jours — découverte</option>
          <option value="14">14 jours — ancrage</option>
          <option value="21">21 jours — habitude</option>
          <option value="30" selected>30 jours — maîtrise</option>
          <option value="60">60 jours — transformation</option>
        </select>
        <button class="btn-primary" id="submitBtn" style="width:100%">commencer</button>
      </div>
      <div id="identityReveal" style="display:none">
        <div class="card"><div class="original-text" id="revealOriginal"></div>
          <div class="identity-text" id="revealIdentity"></div>
          <div class="actions"><button class="btn-primary" id="confirmBtn">c'est juste</button>
          <button class="btn-ghost" id="retryBtn">reformuler</button></div></div>
      </div>
      ${ex}`;
    document.getElementById('submitBtn').onclick=submitGoal;
    document.getElementById('goalInput').onkeydown=e=>{if(e.key==='Enter')submitGoal()};
    document.getElementById('goalInput').focus();
  } else {
    showDashboard(g);
  }
}

async function submitGoal(){
  const i=document.getElementById('goalInput'),t=i.value.trim();
  if(t.length<3)return;
  const d=document.getElementById('durationSelect').value;
  document.getElementById('submitBtn').disabled=true;document.getElementById('submitBtn').textContent='...';
  const r=await req('/goals',{method:'POST',body:JSON.stringify({text:t,duration:d})});
  document.getElementById('submitBtn').textContent='commencer';
  document.getElementById('identityReveal').style.display='block';
  document.getElementById('revealOriginal').textContent=r.text;
  document.getElementById('revealIdentity').textContent=r.identity;
  document.getElementById('confirmBtn').onclick=async()=>{document.getElementById('identityReveal').style.display='none';load();setTimeout(()=>autoQuestion(r.id),300)};
  document.getElementById('retryBtn').onclick=async()=>{const x=await req('/goals/'+r.id+'/reframe',{method:'POST'});if(x.identity){document.getElementById('revealIdentity').textContent=x.identity}};
  document.getElementById('submitBtn').disabled=false;i.value='';
}

function showDashboard(g){
  const app=document.getElementById('app');
  const pct=Math.round((g.dayIndex/g.totalDays)*100);
  const days=new Array(g.totalDays).fill(0).map((_,i)=>i+1);
  const todayScore=g.todayScore?.score;
  const yesterdayVal=g.yesterdayScore?.score;
  const diff=yesterdayVal!==null&&todayScore!==null?todayScore-yesterdayVal:null;
  const avgScore=g.allScores.length?Math.round(g.allScores.reduce((s,x)=>s+x.score,0)/g.allScores.length):0;
  
  let body='';
  if(!g.todayAnswered){
    body=`<div class="card"><div style="font-family:var(--font-serif);color:var(--accent);font-size:.9rem;margin-bottom:.5rem">🌙 Check du soir disponible</div>
      <p style="font-size:.8rem;color:var(--ink-dim);margin-bottom:.5rem">${g.dayIndex===1?'Premier jour ! Lance-toi et réponds à quelques questions personnalisées.':'Fais le bilan de ta journée, je te donnerai un score et ta progression.'}</p>
      <button class="btn-primary" onclick="autoQuestion('${g.id}')">${g.dayIndex===1?'commencer le check →':'faire le bilan →'}</button></div>`;
  } else {
    body=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-family:var(--font-serif);font-size:.9rem;color:var(--success)">✓ Check fait</span>
        <span style="font-size:1.8rem;font-family:var(--font-serif);color:${todayScore<40?'var(--danger)':todayScore<65?'#b8863a':'var(--success)'}">${todayScore}</span>
      </div>
      <div style="font-size:.75rem;color:var(--ink-muted)">Score du jour ${diff!==null?`· ${diff>=0?'↑':'↓'} ${Math.abs(diff)} vs hier`:''}</div>
      <div class="actions"><button class="btn" onclick="showScore('${g.id}')">📊 Voir l'évolution</button>
      <button class="btn" onclick="autoQuestion('${g.id}')">🌙 Refaire le check</button></div>
    </div>`;
  }
  
  app.innerHTML=`<header><div><h1>miroir<span>.</span></h1><div class="sub">carnet d'engagements</div></div>
    <button class="btn" onclick="showScore('${g.id}')" style="padding:.3rem .5rem;font-size:.65rem">📊</button></header>
    <div class="card">
      <div class="original-text">${e(g.text)}</div>
      <div class="identity-text">${e(g.identity)}</div>
      <div class="progress-bar"><div class="fill" style="width:${Math.min(100,pct)}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--ink-muted)">
        <span>Jour ${g.dayIndex}</span><span>${g.daysLeft} jours restants</span>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="num">${g.dayIndex}</div><div class="label">Jour</div></div>
      <div class="stat"><div class="num ${diff!==null?(diff>=0?'up':'down'):''}">${todayScore||'—'}</div><div class="label">Aujourd'hui</div></div>
      <div class="stat"><div class="num ${diff!==null?(diff>=0?'up':'down'):''}">${diff!==null?(diff>=0?'+'+diff:diff):'—'}</div><div class="label">vs Hier</div></div>
      <div class="stat"><div class="num">${avgScore||'—'}</div><div class="label">Moyenne</div></div>
    </div>
    <div class="day-check">${days.map((_,i)=>{const cls=i+1<g.dayIndex?'done':i+1===g.dayIndex?'today':'future';return`<div class="day-dot ${cls}" title="Jour ${i+1}"></div>`}).join('')}</div>
    ${body}`;
}

// ═══ Auto questioning ═══
async function autoQuestion(goalId){
  const modal=document.createElement('div');modal.className='splash-overlay';modal.style.background='rgba(15,15,17,.95)';modal.style.zIndex='800';
  modal.innerHTML=`<div style="max-width:420px;width:90%" id="qbody"></div>`;
  document.body.appendChild(modal);
  const m=document.getElementById('qbody');
  const conv=[];let depth=0;const MAX_Q=5;
  
  m.innerHTML=`<div style="text-align:center;padding:1.5rem 0">
    <div style="font-size:2rem;margin-bottom:.5rem">🎯</div>
    <h3 style="font-family:var(--font-serif)">Explorons ensemble</h3>
    <p style="font-size:.85rem;color:var(--ink-dim);margin:.75rem 0;line-height:1.6">Je vais te poser ${MAX_Q} questions personnalisées. Chaque réponse m'aide à mieux comprendre où tu en es.</p>
    <button class="btn-primary" id="qstart">commencer →</button>
  </div>`;
  document.getElementById('qstart').onclick=ask;
  modal.onclick=e=>{if(e.target===modal)modal.remove()};
  
  async function ask(){
    if(depth>=MAX_Q){
      g=`<div style="text-align:center;padding:1rem">
        <h3 style="font-family:var(--font-serif)">✅ Session terminée</h3>
        <p style="font-size:.85rem;color:var(--ink-dim);margin:.5rem 0 1rem">Je calcule ton score...</p>
        <button class="btn-primary" id="qscore">📊 voir mon score</button>
        <button class="btn-ghost" id="qclose">fermer</button>
      </div>`;
      m.innerHTML=g;
      document.getElementById('qscore').onclick=()=>showScore(goalId);
      document.getElementById('qclose').onclick=()=>modal.remove();
      return;
    }
    m.innerHTML=`<div style="text-align:center;padding:1rem"><span style="font-size:.85rem;color:var(--ink-muted);font-style:italic">réflexion...</span></div>`;
    await new Promise(r=>setTimeout(r,600+Math.random()*400));
    
    const q=await req('/goals/'+goalId+'/next-question',{method:'POST',body:JSON.stringify({conversation:conv})});
    m.innerHTML=`<div style="margin-bottom:.5rem;font-size:.7rem;color:var(--ink-muted)">Question ${depth+1}/${MAX_Q}</div>
      <div style="font-size:.9rem;color:var(--ink);line-height:1.5;margin-bottom:.75rem">${e(q.question||'Comment te sens-tu aujourd\'hui ?')}</div>
      <textarea id="qans" rows="2" placeholder="Ta réponse..." style="margin-bottom:.5rem"></textarea>
      <div class="actions"><button class="btn-primary" id="qnext">suivant →</button></div>`;
    const ta=document.getElementById('qans');ta.focus();
    ta.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('qnext')?.click()}};
    document.getElementById('qnext').onclick=async()=>{
      const txt=ta.value.trim()||'(passé)';
      await req('/goals/'+goalId+'/respond',{method:'POST',body:JSON.stringify({questionId:'checkin',response:txt})});
      conv.push({q:q.question,a:txt});
      depth++;ask();
    };
  }
}

// ═══ Score display ═══
async function showScore(goalId){
  const r=await req('/goals/'+goalId+'/score',{method:'POST'});
  const scores=await req('/goals/'+goalId+'/scores');
  const modal=document.createElement('div');modal.className='splash-overlay';modal.style.background='rgba(15,15,17,.95)';modal.style.zIndex='800';
  const maxScore=Math.max(...scores.map(s=>s.score),100);
  const svgW=320,svgH=140,pad=30,cw=svgW-pad*2,ch=svgH-pad-10;
  let bars='',pts='';
  if(scores.length>1){
    scores.forEach((s,i)=>{
      const bw=Math.max(6,Math.min(20,cw/scores.length-2));const x=pad+i*(cw/(scores.length-1))-bw/2;const h=Math.max(2,(s.score/maxScore)*ch);const y=svgH-pad-h;
      const col=s.score<40?'#8a4a3e':s.score<65?'#b8863a':'#5a7a4e';
      bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="2" fill="${col}" opacity=".9"><animate attributeName="height" from="0" to="${h}" dur=".6s" fill="freeze"/><animate attributeName="y" from="${svgH-pad}" to="${y}" dur=".6s" fill="freeze"/></rect>
      <text x="${x+bw/2}" y="${y-4}" font-size="8" fill="${col}" text-anchor="middle">${s.score}</text>
      <text x="${x+bw/2}" y="${svgH-pad+12}" font-size="7" fill="#49473f" text-anchor="middle">${s.session_date.slice(5)}</text>`;
    });
    pts=`<polyline points="${scores.map((s,i)=>`${pad+i*(cw/(scores.length-1))},${svgH-pad-(s.score/maxScore)*ch}`).join(' ')}" fill="none" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4,2" opacity=".5"/>`;
  }
  const prevScore=r.previousScore;const diff=prevScore!==null?r.score-prevScore:null;
  const g=await req('/goal/current');
  modal.innerHTML=`<div style="max-width:420px;width:90%;padding:.5rem 0" id="qbody">
    <div style="text-align:center">
      <div style="display:flex;align-items:baseline;justify-content:center;gap:.5rem;margin:.5rem 0">
        <span style="font-size:2.5rem;font-family:var(--font-serif);color:${r.score<40?'var(--danger)':r.score<65?'#b8863a':'var(--success)'}">${r.score}</span>
        <span style="font-size:.9rem;color:var(--ink-muted)">/100</span>
        ${diff!==null?`<span style="font-size:.85rem;color:${diff>=0?'var(--success)':'var(--danger)'}">${diff>=0?'↑':'↓'} ${Math.abs(diff)}</span>`:''}
      </div>
      <p style="font-size:.8rem;color:var(--ink-dim);font-style:italic;margin-bottom:.75rem">${e(r.feedback)}</p>
      ${scores.length>1?`<svg width="${svgW}" height="${svgH+18}" viewBox="0 0 ${svgW} ${svgH+18}" style="display:block;margin:0 auto;max-width:100%"><line x1="${pad}" y1="${svgH-pad}" x2="${svgW-pad}" y2="${svgH-pad}" stroke="#2a2826" stroke-width="1"/><line x1="${pad}" y1="${pad}" x2="${pad}" y2="${svgH-pad}" stroke="#2a2826" stroke-width="1"/>${bars}${pts}</svg>`:'<p style="font-size:.7rem;color:var(--ink-muted);text-align:center">Plusieurs jours de données nécessaires pour le graphique</p>'}
      <div class="actions" style="justify-content:center;margin-top:.75rem">
        <button class="btn-primary" id="closeScore">retour</button>
        <button class="btn" onclick="this.closest('[style*=\"z-index:800\"]').remove();autoQuestion('${goalId}')">🌙 refaire le check</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(modal);
  document.getElementById('closeScore').onclick=()=>modal.remove();
  modal.onclick=e=>{if(e.target===modal)modal.remove()};
}

// ═══ Init ═══
setTimeout(load,300);
</script>
</body>
</html>
