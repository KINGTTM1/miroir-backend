<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>miroir — carnet d'engagements</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f11;--surface:#18181c;--surface2:#1f1f24;--border:#2a2826;--ink:#e8e4da;--ink-dim:#6b685e;--ink-muted:#49473f;--accent:#c49a6c;--accent-dim:#5a4530;--danger:#8a4a3e;--success:#5a7a4e;--radius:6px;--font-serif:Georgia,'Times New Roman',serif;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
html{font-size:16px}
body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6;padding:2rem 1rem}
@media(min-width:640px){body{padding:3rem 2rem}}
h1{font-family:var(--font-serif);font-size:1.6rem;font-weight:400;letter-spacing:.02em}
h1 span{color:var(--accent)}
.container{max-width:480px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;padding-bottom:1.5rem;border-bottom:1px solid var(--border);margin-bottom:2rem;position:relative;z-index:2}
.sub{font-size:.75rem;color:var(--ink-muted);font-style:italic}
.btn{background:transparent;border:1px solid var(--border);color:var(--ink-dim);border-radius:var(--radius);padding:.5rem 1rem;font-size:.8rem;cursor:pointer;transition:all .3s}
.btn:hover{border-color:var(--accent-dim);color:var(--accent);transform:translateY(-1px)}
.btn-primary{background:var(--accent-dim);border:1px solid var(--accent);color:var(--ink);border-radius:var(--radius);padding:.6rem 1.5rem;font-size:.85rem;cursor:pointer;transition:all .3s;font-family:var(--font-serif)}
.btn-primary:hover{background:var(--accent);color:var(--bg);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{background:none;border:none;color:var(--ink-muted);cursor:pointer;font-size:.8rem;padding:.3rem;transition:color .2s}
.btn-ghost:hover{color:var(--ink-dim)}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem;font-size:.85rem;color:var(--ink);outline:none;font-family:var(--font-sans);transition:border-color .3s;width:100%}
input:focus,select:focus{border-color:var(--accent-dim)}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem;font-size:.85rem;color:var(--ink);resize:none;outline:none;font-family:var(--font-sans);min-height:60px}
textarea:focus{border-color:var(--accent-dim)}
.actions{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem;animation:fadeUp .5s ease both;position:relative;z-index:2}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.2s}
.card:nth-child(4){animation-delay:.3s}
.identity-text{font-family:var(--font-serif);font-size:1.1rem;color:var(--ink);line-height:1.5;margin:.25rem 0 .5rem}
.original-text{font-size:.7rem;color:var(--ink-muted);text-decoration:line-through;margin-bottom:.25rem;opacity:.7}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:.35rem 0}
.progress-bar .fill{height:100%;background:var(--accent);border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.stat-row{display:flex;gap:.75rem;margin:.5rem 0}
.stat{flex:1;text-align:center;padding:.4rem .25rem;background:var(--surface2);border-radius:var(--radius);animation:fadeUp .5s ease both}
.stat:nth-child(1){animation-delay:.1s}
.stat:nth-child(2){animation-delay:.2s}
.stat:nth-child(3){animation-delay:.3s}
.stat:nth-child(4){animation-delay:.4s}
.stat .num{font-size:1.3rem;font-weight:300;font-family:var(--font-serif);transition:color .3s}
.stat .num.up{color:var(--success)}
.stat .num.down{color:var(--danger)}
.stat .label{font-size:.6rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.06em}
.day-dots{display:flex;gap:2px;margin:.35rem 0;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s}
.dot.done{background:var(--accent)}
.dot.today{background:var(--accent-dim);box-shadow:0 0 0 2px var(--accent);animation:pulse 2s ease infinite}
.dot.future{opacity:.2}
.section-title{font-size:.65rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.08em;margin:1rem 0 .5rem;position:relative;z-index:2}
.strategy{background:var(--surface2);border-left:2px solid var(--accent-dim);padding:.6rem .85rem;font-size:.75rem;color:var(--ink-dim);margin:.5rem 0;border-radius:0 var(--radius) var(--radius) 0;line-height:1.5}
.strategy strong{color:var(--accent)}
.modal{position:fixed;inset:0;z-index:800;background:rgba(15,15,17,.95);display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeUp .3s ease}
.modal-inner{max-width:420px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;max-height:90vh;overflow-y:auto;animation:fadeUp .4s ease}
.exp-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem;margin-bottom:.35rem;opacity:.7;cursor:pointer;transition:all .3s;animation:fadeUp .4s ease}
.exp-card:hover{opacity:1;border-color:var(--accent-dim);transform:translateY(-1px)}
.exp-card .id{font-family:var(--font-serif);font-size:.8rem;color:var(--ink-dim)}
.exp-card .meta{font-size:.6rem;color:var(--ink-muted)}
.thinking-dots{display:inline-block;animation:blink 1.4s ease infinite}
.thinking-dots:nth-child(2){animation-delay:.2s}
.thinking-dots:nth-child(3){animation-delay:.4s}

/* Kinetic Grid */
#kineticCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.5}
body{background:var(--bg)}

/* Splash */
.splash-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease}
.splash-overlay.hidden{opacity:0;pointer-events:none}
.splash-title{font-family:var(--font-serif);font-size:2.2rem;color:var(--ink);letter-spacing:.04em;margin-bottom:1rem;opacity:0;animation:fadeUp .8s ease .3s forwards}
.splash-title span{color:var(--accent)}
.splash-sub{font-size:.8rem;color:var(--ink-muted);font-style:italic;margin-bottom:2rem;opacity:0;animation:fadeUp .8s ease .6s forwards}
.splash-safe{position:relative;width:180px;height:150px;margin-bottom:2rem;opacity:0;animation:fadeUp .8s ease .9s forwards}
.safe-body{width:180px;height:140px;background:linear-gradient(145deg,#2a2826,#1a1816);border:3px solid #3a3836;border-radius:8px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.safe-door{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(145deg,#2a2826,#1a1816);border-radius:6px;transform-origin:left center;transition:transform 1.2s cubic-bezier(.4,0,.2,1);z-index:2}
.safe-door.open{transform:perspective(800px) rotateY(-110deg)}
.safe-dial{position:absolute;top:50%;left:50%;width:56px;height:56px;margin:-28px 0 0 -28px;border:3px solid #4a4846;border-radius:50%;background:radial-gradient(circle,#3a3836,#1a1816);z-index:3;display:flex;align-items:center;justify-content:center}
.safe-dial.spinning{animation:spinDial 5s cubic-bezier(.4,0,.2,1)}
.safe-dial-inner{width:16px;height:16px;border-radius:50%;background:var(--accent);opacity:.8}
.dial-mark{position:absolute;width:2px;height:8px;background:#5a5856;top:4px;left:50%;margin-left:-1px;transform-origin:50% 24px}
.safe-handle{position:absolute;right:12px;top:50%;margin-top:-8px;width:24px;height:16px;border:3px solid #4a4846;border-radius:4px;background:#3a3836;z-index:3;transition:transform 1s ease .5s}
.safe-handle.turned{transform:rotate(90deg)}
.safe-glow{position:absolute;inset:-10px;border-radius:12px;background:radial-gradient(ellipse at center, rgba(196,154,108,.15), transparent 70%);opacity:0;transition:opacity 1s ease;z-index:0}
.safe-glow.active{opacity:1}
.splash-btn{background:transparent;border:1px solid var(--accent-dim);color:var(--accent);border-radius:var(--radius);padding:.75rem 2.5rem;font-size:1rem;cursor:pointer;transition:all .3s;opacity:0;animation:fadeUp .8s ease 1.2s forwards;font-family:var(--font-serif);letter-spacing:.06em}
.splash-btn:hover{background:var(--accent-dim);color:var(--ink);border-color:var(--accent)}
.splash-btn:disabled{opacity:.3;cursor:not-allowed}

/* Celebrations */
.celebration-overlay{position:fixed;inset:0;z-index:300;pointer-events:none;overflow:hidden}
.celebration-piece{position:absolute;bottom:-10px;width:8px;height:8px;border-radius:2px;animation:confetti 2s ease-out forwards}
.celebration-piece:nth-child(odd){background:var(--accent)}
.celebration-piece:nth-child(even){background:var(--accent-dim)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spinDial{0%{transform:rotate(0deg)}100%{transform:rotate(720deg)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-200px) rotate(720deg);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<canvas id="kineticCanvas"></canvas>
<div class="splash-overlay" id="splash">
  <div class="splash-title">miroir<span>.</span></div>
  <div class="splash-sub">carnet d'engagements</div>
  <div class="splash-safe" id="splashSafe">
    <div class="safe-body">
      <div class="safe-glow" id="safeGlow"></div>
      <div class="safe-door" id="safeDoor">
        <div class="safe-dial" id="safeDial">
          <div class="dial-mark" style="transform:rotate(0deg)"></div>
          <div class="dial-mark" style="transform:rotate(30deg)"></div>
          <div class="dial-mark" style="transform:rotate(60deg)"></div>
          <div class="dial-mark" style="transform:rotate(90deg)"></div>
          <div class="dial-mark" style="transform:rotate(120deg)"></div>
          <div class="dial-mark" style="transform:rotate(150deg)"></div>
          <div class="dial-mark" style="transform:rotate(180deg)"></div>
          <div class="dial-mark" style="transform:rotate(210deg)"></div>
          <div class="dial-mark" style="transform:rotate(240deg)"></div>
          <div class="dial-mark" style="transform:rotate(270deg)"></div>
          <div class="dial-mark" style="transform:rotate(300deg)"></div>
          <div class="dial-mark" style="transform:rotate(330deg)"></div>
          <div class="safe-dial-inner"></div>
        </div>
      </div>
      <div class="safe-handle" id="safeHandle"></div>
    </div>
  </div>
  <button class="splash-btn" id="splashBtn" onclick="(function(){var b=document.getElementById('splashBtn');b.disabled=true;b.textContent='...';document.getElementById('safeDial').classList.add('spinning');setTimeout(function(){document.getElementById('safeDial').classList.remove('spinning');document.getElementById('safeDoor').classList.add('open');document.getElementById('safeHandle').classList.add('turned');document.getElementById('safeGlow').classList.add('active');b.textContent='\u2728';setTimeout(function(){document.getElementById('splash').classList.add('hidden');if(!window._loaded){window._loaded=true;load()}setTimeout(function(){var s=document.getElementById('splash');if(s)s.remove()},800)},1000)},5000)})()">ouvrir</button>
</div>
<div class="container" id="app"></div>
<script>
// ═══ Kinetic Grid ═══
(function(){const c=document.getElementById('kineticCanvas');if(!c)return;const x=c.getContext('2d');if(!x)return;
const G=30,R=350,P=2.4;let w,h,d=[],m={x:-9999,y:-9999,a:false},t=[],rf=0;
function rs(){const p=window.devicePixelRatio||1;w=window.innerWidth;h=window.innerHeight;c.width=Math.floor(w*p);c.height=Math.floor(h*p);x.setTransform(p,0,0,p,0,0);
d=[];const cl=Math.floor(w/G)+2,rw=Math.floor(h/G)+2;for(let i=0;i<cl;i++)for(let j=0;j<rw;j++)d.push({hx:i*G,hy:j*G,x:i*G,y:j*G,vx:0,vy:0})}
rs();window.addEventListener('resize',rs);
document.addEventListener('mousemove',e=>{m.x=e.clientX;m.y=e.clientY;m.a=true;t.push({x:e.clientX,y:e.clientY,t:performance.now()});if(t.length>80)t.shift()});
document.addEventListener('mouseleave',()=>{m.a=false});
const lc='#c49a6c';
function fr(){x.clearRect(0,0,w,h);
for(const p of d){let ax=(p.hx-p.x)*0.08,ay=(p.hy-p.y)*0.08;if(m.a){const dx=m.x-p.x,dy=m.y-p.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<R&&dist>0.001){const f=(1-dist/R)*P;ax+=(dx/dist)*f;ay+=(dy/dist)*f}}p.vx=(p.vx+ax)*.82;p.vy=(p.vy+ay)*.82;p.x+=p.vx;p.y+=p.vy}
const nc=Math.floor(w/G)+2;
for(let i=0;i<d.length;i++){const p=d[i],rt=d[i+1],dn=d[i+nc];const px=m.a?Math.max(0,1-Math.sqrt((m.x-p.x)**2+(m.y-p.y)**2)/R):0;
if(rt&&(i+1)%nc!==0){x.globalAlpha=.06+px*.5;x.strokeStyle=lc;x.lineWidth=.5+px*1.2;x.beginPath();x.moveTo(p.x,p.y);x.lineTo(rt.x,rt.y);x.stroke()}
if(dn){x.globalAlpha=.06+px*.5;x.strokeStyle=lc;x.lineWidth=.5+px*1.2;x.beginPath();x.moveTo(p.x,p.y);x.lineTo(dn.x,dn.y);x.stroke()}}
for(const p of d){const px=m.a?Math.max(0,1-Math.sqrt((m.x-p.x)**2+(m.y-p.y)**2)/R):0;x.globalAlpha=.15+px*.7;x.fillStyle='#c49a6c';x.beginPath();x.arc(p.x,p.y,.6+px*1.8,0,Math.PI*2);x.fill()}
const nw=performance.now();for(let i=1;i<t.length;i++){const a=t[i-1],b=t[i],ag=nw-b.t;if(ag>260)continue;x.globalAlpha=Math.max(0,1-ag/260)*.6;x.strokeStyle=lc;x.lineWidth=1.5;x.lineCap='round';x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke()}
x.globalAlpha=1;rf=requestAnimationFrame(fr)}
rf=requestAnimationFrame(fr)})();

// ═══ App ═══
const A='';
function req(p,o={}){return fetch(A+'/api'+p,{headers:{'Content-Type':'application/json',...o.headers},...o}).then(r=>r.json())}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function celebration(){const o=document.createElement('div');o.className='celebration-overlay';for(let i=0;i<25;i++){const p=document.createElement('div');p.className='celebration-piece';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*1.5+'s';p.style.width=(4+Math.random()*6)+'px';p.style.height=(4+Math.random()*6)+'px';o.appendChild(p)}document.body.appendChild(o);setTimeout(()=>o.remove(),3000)}

async function load(){
  const app=document.getElementById('app');
  const goals=await req('/goals');
  const active=goals.filter(g=>g.status==='active'||!g.status);
  const exps=await req('/goals/experiences');
  
  if(!active.length){
    let ex='';
    if(exps.length)ex=`<div class="section-title">✦ Expériences</div>${exps.map(x=>`<div class="exp-card" onclick="showScore('${x.id}')"><div class="id">${esc(x.identity||x.text).slice(0,50)}</div><div class="meta">${x.avgScore}/100</div></div>`).join('')}`;
    app.innerHTML=`<header><div><h1>miroir<span>.</span></h1><div class="sub">Nouvel engagement</div></div></header>
      <div class="card" style="text-align:center"><p style="font-size:.85rem;color:var(--ink-dim);margin-bottom:1rem;line-height:1.5">Un engagement à la fois, avec un accompagnement personnalisé par l'IA.</p>
        <div style="font-size:.8rem;color:var(--ink-dim);margin-bottom:.25rem;text-align:left">Je choisis de...</div>
        <input id="gi" placeholder="ex: méditer 10 min chaque matin" autocomplete="off" style="margin-bottom:.5rem"/>
        <select id="dur" style="font-size:.8rem;margin-bottom:.75rem">
          <option value="7">7 jours · découverte</option>
          <option value="14">14 jours · ancrage</option>
          <option value="21">21 jours · habitude</option>
          <option value="30" selected>30 jours · maîtrise</option>
          <option value="60">60 jours · transformation</option>
        </select>
        <button class="btn-primary" id="sb" style="width:100%">commencer</button>
      </div>
      <div id="reveal" style="display:none"></div>
      ${ex}`;
    document.getElementById('sb').onclick=createGoal;
    document.getElementById('gi').onkeydown=e=>{if(e.key==='Enter')createGoal()};
    document.getElementById('gi').focus();
  } else {
    let cards='';
    active.forEach(g=>{
      const createdAt=new Date(g.created_at);const now=new Date();
      const dayIndex=Math.round((now-createdAt)/864e5)+1;
      const totalDays=g.duration_days||30;const daysLeft=Math.max(0,totalDays-dayIndex+1);
      const pct=Math.round((dayIndex/totalDays)*100);const dots=Array(totalDays).fill(0);
      const cm=g.todayAnswered?'✅':'🌙';
      cards+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1"><div class="original-text">${esc(g.text)}</div><div class="identity-text">${esc(g.identity)}</div></div>
          <button class="btn-ghost" onclick="delGoal('${g.id}')" style="font-size:.8rem;opacity:.4">✕</button>
        </div>
        <div class="progress-bar"><div class="fill" style="width:${Math.min(100,pct)}%"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--ink-muted)">Jour ${dayIndex}/${totalDays} · ${daysLeft} restants</div>
        <div class="day-dots">${dots.map((_,i)=>{const c=i+1<dayIndex?'done':i+1===dayIndex?'today':'future';return`<div class="dot ${c}"></div>`}).join('')}</div>
        ${g.todayAnswered?`<div style="display:flex;align-items:center;gap:.5rem;margin:.35rem 0;font-size:.8rem;color:var(--success)">✅ Check fait</div>`:`<button class="btn-primary" style="width:100%;margin:.35rem 0" onclick="checkGoal('${g.id}','${esc(g.identity)}')">${cm} faire le check</button>`}
        <div class="actions" style="margin-top:.35rem">
          <button class="btn" onclick="showScore('${g.id}')" style="font-size:.7rem;padding:.3rem .5rem">📊 évolution</button>
          <button class="btn" onclick="interact('${g.id}')" style="font-size:.7rem;padding:.3rem .5rem">c'est moi</button>
        </div>
      </div>`;
    });
    const addBtn=active.length<3?`<button class="btn" onclick="showCreate()" style="width:100%;text-align:center;padding:.75rem;border-style:dashed;margin-bottom:.75rem;animation:fadeUp .5s ease">+ Nouvel objectif</button>`:'';
    let ex='';
    if(exps.length)ex=`<div class="section-title">✦ Expériences</div>${exps.slice(0,3).map(x=>`<div class="exp-card" onclick="showScore('${x.id}')"><div class="id">${esc(x.identity||x.text).slice(0,50)}</div><div class="meta">${x.avgScore}/100</div></div>`).join('')}`;
    app.innerHTML=`<header><div><h1>miroir<span>.</span></h1><div class="sub">${active.length}/3 engagements</div></div></header>${cards}${addBtn}${ex}`;
  }
}

async function createGoal(){
  const i=document.getElementById('gi'),t=i.value.trim();if(t.length<3)return;
  const d=document.getElementById('dur').value;
  document.getElementById('sb').disabled=true;document.getElementById('sb').textContent='...';
  const r=await req('/goals',{method:'POST',body:JSON.stringify({text:t,duration:d})});
  if(r.error){alert(r.error);document.getElementById('sb').disabled=false;document.getElementById('sb').textContent='commencer';return}
  document.getElementById('sb').textContent='commencer';
  document.getElementById('reveal').style.display='block';
  document.getElementById('reveal').innerHTML=`<div class="card"><div class="original-text">${esc(r.text)}</div><div class="identity-text">${esc(r.identity)}</div>
    <div class="strategy"><strong>Stratégie :</strong> Formule ton engagement comme une décision précise : « Quand X arrivera, je ferai Y. » Ça multiplie les chances de succès.</div>
    <div class="actions"><button class="btn-primary" id="cfBtn">c'est juste</button><button class="btn-ghost" id="refBtn">reformuler</button></div></div>`;
  document.getElementById('cfBtn').onclick=()=>{document.getElementById('reveal').style.display='none';load();setTimeout(()=>checkGoal(r.id,esc(r.identity)),400)};
  document.getElementById('refBtn').onclick=async()=>{const x=await req('/goals/'+r.id+'/reframe',{method:'POST'});if(x.identity)document.getElementById('reveal').querySelector('.identity-text').textContent=x.identity};
  document.getElementById('sb').disabled=false;i.value='';
}

function showCreate(){document.getElementById('app').insertAdjacentHTML('afterbegin',`<div class="card" id="quickForm" style="animation:fadeUp .4s ease"><input id="qgi" placeholder="ex: lire 20 pages par jour" autocomplete="off" style="margin-bottom:.35rem"/><select id="qdr" style="font-size:.8rem;width:100%;margin-bottom:.5rem"><option value="7">7j</option><option value="14">14j</option><option value="21">21j</option><option value="30" selected>30j</option><option value="60">60j</option></select><button class="btn-primary" style="width:100%" id="qsb">ajouter</button></div>`);
  document.getElementById('qgi').focus();
  document.getElementById('qsb').onclick=async()=>{const t=document.getElementById('qgi').value.trim();if(t.length<3)return;const d=document.getElementById('qdr').value;const r=await req('/goals',{method:'POST',body:JSON.stringify({text:t,duration:d})});if(r.error){alert(r.error);return}document.getElementById('quickForm').remove();load();setTimeout(()=>checkGoal(r.id,esc(r.identity)),400)};
  document.getElementById('qgi').onkeydown=e=>{if(e.key==='Enter')document.getElementById('qsb').click()};
}

async function delGoal(id){if(confirm('Supprimer ?')){await req('/goals/'+id,{method:'DELETE'});load()}}

// ═══ Check flow with analysis ═══
async function checkGoal(id,identity){
  const modal=document.createElement('div');modal.className='modal';
  modal.innerHTML=`<div class="modal-inner" id="qm"><div style="text-align:center;padding:.5rem 0">
    <div style="font-size:1.5rem;margin-bottom:.5rem">🎯</div>
    <p style="font-size:.8rem;color:var(--ink-dim);margin:.5rem 0">Check personnalisé — chaque question s'adapte à ta réponse.</p>
    <button class="btn-primary" id="qs">commencer</button></div></div>`;
  document.body.appendChild(modal);const m=document.getElementById('qm');
  const conv=[];let depth=0;const MAX=5;
  document.getElementById('qs').onclick=ask;
  modal.onclick=e=>{if(e.target===modal)modal.remove()};
  
  async function ask(){
    if(depth>=MAX) return showAnalysis();
    
    m.innerHTML=`<div style="text-align:center;padding:1rem"><span style="font-size:.8rem;color:var(--ink-muted);font-style:italic">réflexion<span class="thinking-dots">.</span><span class="thinking-dots" style="animation-delay:.2s">.</span><span class="thinking-dots" style="animation-delay:.4s">.</span></span></div>`;
    await new Promise(r=>setTimeout(r,500+Math.random()*400));
    const q=await req('/goals/'+id+'/next-question',{method:'POST',body:JSON.stringify({conversation:conv})});
    m.innerHTML=`<div style="margin-bottom:.25rem;font-size:.65rem;color:var(--ink-muted)">Question ${depth+1}/${MAX}</div>
      <div style="font-size:.9rem;color:var(--ink);line-height:1.5;margin-bottom:.5rem;font-family:var(--font-serif)">${esc(q.question||'Comment te sens-tu ?')}</div>
      <textarea id="qa" rows="2" placeholder="Ta réponse..."></textarea>
      <div class="actions"><button class="btn-primary" id="qn">suivant →</button></div>`;
    const ta=document.getElementById('qa');ta.focus();
    ta.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('qn')?.click()}};
    document.getElementById('qn').onclick=async()=>{
      const txt=ta.value.trim()||'(passé)';
      await req('/goals/'+id+'/respond',{method:'POST',body:JSON.stringify({questionId:'checkin',response:txt})});
      conv.push({q:q.question,a:txt});depth++;ask();
    };
  }
  
  async function showAnalysis(){
    m.innerHTML=`<div style="text-align:center;padding:1rem"><span style="font-size:.8rem;color:var(--ink-muted);font-style:italic">Analyse en cours<span class="thinking-dots">.</span><span class="thinking-dots" style="animation-delay:.2s">.</span><span class="thinking-dots" style="animation-delay:.4s">.</span></span></div>`;
    const r=await req('/goals/'+id+'/analyze',{method:'POST'});
    const diff=r.diff;const arrow=diff!==null?(diff>=0?'↑':'↓'):'';
    const col=diff!==null?(diff>=0?'var(--success)':'var(--danger)'):'var(--ink-muted)';
    m.innerHTML=`<div>
      <div style="display:flex;align-items:baseline;justify-content:center;gap:.5rem;margin:.5rem 0">
        <span style="font-size:2.5rem;font-family:var(--font-serif);color:${r.score<40?'var(--danger)':r.score<65?'#b8863a':'var(--success)'}">${r.score}</span>
        <span style="font-size:.8rem;color:var(--ink-muted)">/100</span>
        ${diff!==null?`<span style="font-size:.85rem;color:${col}">${arrow} ${Math.abs(diff)}</span>`:''}
        ${r.responses>0?`<span style="font-size:.65rem;color:var(--ink-muted)">${r.responses} réponses</span>`:''}
      </div>
      ${r.analysis?`<div class="strategy" style="border-left-color:${r.score<40?'var(--danger)':r.score<65?'#b8863a':'var(--success)'};font-size:.85rem;color:var(--ink)">${esc(r.analysis)}</div>`:''}
      ${diff!==null?`<div style="font-size:.7rem;color:var(--ink-muted);text-align:center;margin:.75rem 0">
        Progression: ${r.score > (r.previousScore||0) ? '📈 en hausse' : r.score < (r.previousScore||0) ? '📉 en baisse' : '➡️ stable'}
      </div>`:''}
      <div class="strategy" style="margin-top:.5rem"><strong>💡 Conseil :</strong> ${r.score>=70?'Continue comme ça. La régularité crée l\'habitude plus que l\'intensité.' : r.score>=50?'Identifie ce qui te freine et ajuste une variable (horaire, durée, préparation).' : 'Réduis l\'objectif à quelque chose de si petit que tu ne peux pas refuser. 5 minutes suffisent.'}</div>
      <div class="actions" style="justify-content:center;margin-top:.75rem">
        <button class="btn-primary" onclick="modal.remove();load()">OK</button>
        <button class="btn" onclick="modal.remove();checkGoal('${id}','${identity}')">🔄 refaire</button>
      </div>
    </div>`;
  }
}

async function interact(id){
  const r=await req('/goals/'+id+'/interact',{method:'POST'});
  if(r.reinforcement)showToast(r.reinforcement);
  load();
}

// ═══ Score ═══
async function showScore(id){
  const r=await req('/goals/'+id+'/score',{method:'POST'});
  const scores=await req('/goals/'+id+'/scores');
  const maxS=Math.max(...scores.map(s=>s.score),100);
  const sw=320,sh=140,pad=30,cw=sw-pad*2,ch=sh-pad-10;
  let bars='',pts='';
  if(scores.length>1){
    scores.forEach((s,i)=>{
      const bw=Math.max(6,Math.min(18,cw/scores.length-2));const x=pad+i*(cw/(scores.length-1))-bw/2;const h=Math.max(2,(s.score/maxS)*ch);const y=sh-pad-h;
      const col=s.score<40?'#8a4a3e':s.score<65?'#b8863a':'#5a7a4e';
      bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="2" fill="${col}" opacity=".9"><animate attributeName="height" from="0" to="${h}" dur=".6s" fill="freeze"/><animate attributeName="y" from="${sh-pad}" to="${y}" dur=".6s" fill="freeze"/></rect>
      <text x="${x+bw/2}" y="${y-4}" font-size="8" fill="${col}" text-anchor="middle">${s.score}</text>
      <text x="${x+bw/2}" y="${sh-pad+12}" font-size="7" fill="#49473f" text-anchor="middle">${s.session_date.slice(5)}</text>`;
    });
    pts=`<polyline points="${scores.map((s,i)=>`${pad+i*(cw/(scores.length-1))},${sh-pad-(s.score/maxS)*ch}`).join(' ')}" fill="none" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4,2" opacity=".5"/>`;
  }
  const prev=r.previousScore;const diff=prev!==null?r.score-prev:null;
  const modal=document.createElement('div');modal.className='modal';
  modal.innerHTML=`<div class="modal-inner"><div style="text-align:center">
    <div style="display:flex;align-items:baseline;justify-content:center;gap:.5rem;margin:.5rem 0">
      <span style="font-size:2.2rem;font-family:var(--font-serif);color:${r.score<40?'var(--danger)':r.score<65?'#b8863a':'var(--success)'}">${r.score}</span>
      <span style="font-size:.8rem;color:var(--ink-muted)">/100</span>
      ${diff!==null?`<span style="font-size:.8rem;color:${diff>=0?'var(--success)':'var(--danger)'}">${diff>=0?'↑':'↓'} ${Math.abs(diff)}</span>`:''}
    </div>
    <p style="font-size:.75rem;color:var(--ink-dim);font-style:italic;margin-bottom:.75rem">${esc(r.feedback)}</p>
    ${scores.length>1?`<svg width="${sw}" height="${sh+18}" viewBox="0 0 ${sw} ${sh+18}" style="display:block;margin:0 auto;max-width:100%"><line x1="${pad}" y1="${sh-pad}" x2="${sw-pad}" y2="${sh-pad}" stroke="#2a2826" stroke-width="1"/><line x1="${pad}" y1="${pad}" x2="${pad}" y2="${sh-pad}" stroke="#2a2826" stroke-width="1"/>${bars}${pts}</svg>`:'<p style="font-size:.65rem;color:var(--ink-muted)">Plusieurs jours pour le graphique</p>'}
    <div class="actions" style="justify-content:center;margin-top:.75rem">
      <button class="btn-primary" onclick="modal.remove();load()">retour</button>
      <button class="btn" onclick="modal.remove();checkGoal('${id}','')">🌙 refaire le check</button>
    </div>
  </div></div>`;
  document.body.appendChild(modal);
  modal.onclick=e=>{if(e.target===modal)modal.remove()};
}

function showToast(t){const d=document.createElement('div');d.textContent=t;d.style.cssText='position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--ink);padding:.5rem 1rem;border-radius:var(--radius);font-size:.8rem;z-index:900;animation:fadeUp .3s ease';document.body.appendChild(d);setTimeout(()=>d.remove(),3000)}

setTimeout(load,300);
</script>
</body>
</html>
